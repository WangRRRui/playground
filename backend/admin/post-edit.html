<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post | Rui的Playground Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; min-height: 100vh; }
        h1, h2, h3, .font-mono { font-family: 'JetBrains Mono', monospace; }
        input, textarea, select { background: #111; border: 1px solid #333; color: #e0e0e0; }
        input:focus, textarea:focus, select:focus { border-color: #00ff41; outline: none; }
        .btn-primary { background: #00ff41; color: #000; }
        .btn-primary:hover { background: #00cc33; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-secondary:hover { background: #444; }
        .preview-content h1 { font-size: 2em; font-weight: bold; margin: 1em 0 0.5em; color: #00ff41; }
        .preview-content h2 { font-size: 1.5em; font-weight: bold; margin: 1em 0 0.5em; color: #00f3ff; }
        .preview-content h3 { font-size: 1.25em; font-weight: bold; margin: 1em 0 0.5em; color: #bc13fe; }
        .preview-content p { margin: 1em 0; line-height: 1.7; }
        .preview-content code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
        .preview-content pre { background: #1a1a1a; padding: 1em; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
        .preview-content pre code { background: none; padding: 0; }
        .preview-content ul, .preview-content ol { margin: 1em 0; padding-left: 2em; }
        .preview-content li { margin: 0.5em 0; }
        .preview-content blockquote { border-left: 3px solid #00ff41; padding-left: 1em; margin: 1em 0; color: #888; }
        .preview-content a { color: #00f3ff; text-decoration: underline; }
        .tag-chip { display: inline-flex; align-items: center; gap: 4px; background: #222; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .tag-chip button { color: #ff003c; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-800">
            <h1 id="pageTitle" class="text-xl text-[#00ff41]">[ NEW POST ]</h1>
            <div class="flex gap-4">
                <a href="/admin/" class="px-4 py-2 rounded border border-gray-600 text-gray-400 hover:text-white text-sm">BACK</a>
            </div>
        </div>

        <form id="postForm" class="space-y-6">
            <!-- Title & Slug -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-2 text-gray-400">TITLE *</label>
                    <input type="text" id="title" class="w-full px-4 py-2 rounded" required>
                </div>
                <div>
                    <label class="block text-sm mb-2 text-gray-400">SLUG *</label>
                    <input type="text" id="slug" class="w-full px-4 py-2 rounded font-mono" placeholder="my-post-slug" required pattern="^[a-z0-9-]+$">
                </div>
            </div>

            <!-- Metadata -->
            <div class="grid grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm mb-2 text-gray-400">AUTHOR</label>
                    <input type="text" id="author" class="w-full px-4 py-2 rounded" value="Admin">
                </div>
                <div>
                    <label class="block text-sm mb-2 text-gray-400">VERSION</label>
                    <input type="text" id="version" class="w-full px-4 py-2 rounded" placeholder="v1.0">
                </div>
                <div>
                    <label class="block text-sm mb-2 text-gray-400">READ TIME</label>
                    <input type="text" id="read_time" class="w-full px-4 py-2 rounded" placeholder="5 min">
                </div>
                <div>
                    <label class="block text-sm mb-2 text-gray-400">COVER IMAGE</label>
                    <input type="text" id="cover_image" class="w-full px-4 py-2 rounded" placeholder="/uploads/image.png">
                </div>
            </div>

            <!-- Excerpt -->
            <div>
                <label class="block text-sm mb-2 text-gray-400">EXCERPT</label>
                <textarea id="excerpt" class="w-full px-4 py-2 rounded h-20" placeholder="Short description..."></textarea>
            </div>

            <!-- Tags -->
            <div>
                <label class="block text-sm mb-2 text-gray-400">TAGS</label>
                <div class="flex gap-2 flex-wrap mb-2" id="tagContainer"></div>
                <div class="flex gap-2">
                    <input type="text" id="newTag" class="flex-1 px-4 py-2 rounded" placeholder="Add tag...">
                    <button type="button" onclick="addTag()" class="btn-secondary px-4 py-2 rounded">ADD</button>
                </div>
            </div>

            <!-- Content Editor -->
            <div>
                <label class="block text-sm mb-2 text-gray-400">CONTENT (MARKDOWN) *</label>
                <div class="grid grid-cols-2 gap-4">
                    <textarea id="content" class="w-full px-4 py-3 rounded h-96 font-mono text-sm" placeholder="# Your content here..."></textarea>
                    <div class="bg-[#111] rounded p-4 h-96 overflow-auto">
                        <div class="text-xs text-gray-500 mb-2">PREVIEW</div>
                        <div id="preview" class="preview-content"></div>
                    </div>
                </div>
            </div>

            <!-- Image Upload -->
            <div>
                <label class="block text-sm mb-2 text-gray-400">UPLOAD IMAGE</label>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('imageUpload').click()" class="btn-secondary px-4 py-2 rounded">
                    Choose Image
                </button>
                <span id="uploadStatus" class="ml-4 text-sm text-gray-500"></span>
            </div>

            <!-- Actions -->
            <div class="flex gap-4 pt-4 border-t border-gray-800">
                <button type="submit" name="action" value="publish" class="btn-primary px-6 py-3 rounded font-mono">
                    PUBLISH
                </button>
                <button type="submit" name="action" value="draft" class="btn-secondary px-6 py-3 rounded font-mono">
                    SAVE DRAFT
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script>
        const API_BASE = '/api/v1';
        const token = localStorage.getItem('token');
        const urlParams = new URLSearchParams(window.location.search);
        const editSlug = urlParams.get('slug');
        let tags = [];

        // Check auth
        if (!token) {
            window.location.href = '/admin/login.html';
        }

        const authHeaders = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };

        // Live preview
        document.getElementById('content').addEventListener('input', (e) => {
            document.getElementById('preview').innerHTML = marked.parse(e.target.value);
        });

        // Auto-generate slug from title
        document.getElementById('title').addEventListener('input', (e) => {
            if (!editSlug) {
                const slug = e.target.value
                    .toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .trim();
                document.getElementById('slug').value = slug;
            }
        });

        // Tags management
        function addTag() {
            const input = document.getElementById('newTag');
            const tagName = input.value.trim();
            if (tagName && !tags.includes(tagName)) {
                tags.push(tagName);
                renderTags();
            }
            input.value = '';
        }

        function removeTag(index) {
            tags.splice(index, 1);
            renderTags();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            container.innerHTML = tags.map((tag, i) => `
                <span class="tag-chip">
                    ${tag}
                    <button type="button" onclick="removeTag(${i})">&times;</button>
                </span>
            `).join('');
        }

        document.getElementById('newTag').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTag();
            }
        });

        // Image upload
        document.getElementById('imageUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            status.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/upload/image`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!res.ok) throw new Error('Upload failed');

                const data = await res.json();
                status.textContent = `Uploaded: ${data.url}`;

                // Insert markdown image at cursor
                const textarea = document.getElementById('content');
                const imageMarkdown = `![${file.name}](${data.url})`;
                const pos = textarea.selectionStart;
                textarea.value = textarea.value.slice(0, pos) + imageMarkdown + textarea.value.slice(pos);
                textarea.dispatchEvent(new Event('input'));
            } catch (err) {
                status.textContent = 'Upload failed!';
                console.error(err);
            }
        });

        // Load existing post for editing
        async function loadPost(slug) {
            try {
                const res = await fetch(`${API_BASE}/posts/${slug}`, { headers: authHeaders });
                if (!res.ok) throw new Error('Post not found');

                const post = await res.json();
                document.getElementById('pageTitle').textContent = '[ EDIT POST ]';
                document.getElementById('title').value = post.title;
                document.getElementById('slug').value = post.slug;
                document.getElementById('slug').readOnly = true;
                document.getElementById('author').value = post.author || '';
                document.getElementById('version').value = post.version || '';
                document.getElementById('read_time').value = post.read_time || '';
                document.getElementById('cover_image').value = post.cover_image || '';
                document.getElementById('excerpt').value = post.excerpt || '';
                document.getElementById('content').value = post.content;
                document.getElementById('preview').innerHTML = marked.parse(post.content);

                tags = post.tags.map(t => t.name);
                renderTags();
            } catch (err) {
                console.error(err);
                alert('Failed to load post');
            }
        }

        // Form submit
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const action = e.submitter.value;

            const data = {
                title: document.getElementById('title').value,
                slug: document.getElementById('slug').value,
                content: document.getElementById('content').value,
                excerpt: document.getElementById('excerpt').value || null,
                cover_image: document.getElementById('cover_image').value || null,
                version: document.getElementById('version').value || null,
                read_time: document.getElementById('read_time').value || null,
                author: document.getElementById('author').value || 'Admin',
                tags: tags,
                is_published: action === 'publish'
            };

            try {
                const url = editSlug ? `${API_BASE}/posts/${editSlug}` : `${API_BASE}/posts`;
                const method = editSlug ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: authHeaders,
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Save failed');
                }

                window.location.href = '/admin/';
            } catch (err) {
                alert(err.message);
            }
        });

        // Initialize
        if (editSlug) {
            loadPost(editSlug);
        }
    </script>
</body>
</html>
