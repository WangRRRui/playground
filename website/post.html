            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #ff003c;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch-text::after {

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Load post from API
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('markdown-content').innerHTML = '<p class="text-gray-500">No post slug specified in URL.</p>';
                return;
            }

            try {
                const post = await BlogAPI.getPost(slug);

                // Update page title
                document.title = `${post.title} | Agent.EXE`;

                // Update header
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-title').setAttribute('data-text', post.title);
                document.getElementById('post-author').textContent = post.author || 'Admin';
                document.getElementById('post-date').textContent = post.published_at
                    ? new Date(post.published_at).toISOString().split('T')[0]
                    : 'DRAFT';
                document.getElementById('post-read-time').textContent = post.read_time || '5 MIN READ';

                // Update tags
                const tagColors = ['green', 'blue', 'purple', 'red'];
                document.getElementById('post-tags').innerHTML = post.tags.map((tag, i) => {
                    const color = tag.color || tagColors[i % tagColors.length];
                    return `<span class="px-2 py-1 bg-cyber-${color}/10 text-cyber-${color} text-xs font-mono border border-cyber-${color}/30 rounded">#${tag.name.toUpperCase()}</span>`;
                }).join('');

                // Update cover image
                if (post.cover_image) {
                    const coverDiv = document.getElementById('post-cover');
                    const coverImg = document.getElementById('post-cover-img');
                    coverImg.src = post.cover_image;
                    coverImg.alt = post.title;
                    coverDiv.classList.remove('hidden');
                }

                // Render Markdown content
                document.getElementById('markdown-content').innerHTML = marked.parse(post.content);

                // Re-highlight code blocks
                if (typeof Prism !== 'undefined') {
                    Prism.highlightAll();
                }

                // Generate TOC from headings
                generateTOC();

                // Load prev/next navigation
                loadPostNav(slug, post.published_at);

                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load post:', error);
                document.getElementById('post-title').textContent = 'Post Not Found';
                document.getElementById('post-title').setAttribute('data-text', 'Post Not Found');
                document.getElementById('markdown-content').innerHTML = `<p class="text-gray-500">Could not load the post. The API may be offline or the post doesn't exist.</p>`;
            }
        }

        async function loadPostNav(currentSlug, currentDate) {
            try {
                const data = await BlogAPI.getPosts({ page: 1, page_size: 100 });
                const posts = data.items || [];
                const idx = posts.findIndex(p => p.slug === currentSlug);
                if (idx === -1) return;

                const nav = document.getElementById('post-nav');
                // posts are sorted newest first, so "prev" = older = idx+1, "next" = newer = idx-1
                const prev = idx < posts.length - 1 ? posts[idx + 1] : null;
                const next = idx > 0 ? posts[idx - 1] : null;

                let html = '';
                if (prev) {
                    html += `<a href="post.html?slug=${prev.slug}" class="group p-4 border border-gray-800 hover:border-cyber-green bg-cyber-gray/30 transition-all rounded-sm">
                        <div class="text-xs text-gray-500 font-mono mb-1 group-hover:text-cyber-green">&lt; PREVIOUS_LOG</div>
                        <div class="text-white font-bold truncate">${prev.title}</div>
                    </a>`;
                } else {
                    html += '<div></div>';
                }
                if (next) {
                    html += `<a href="post.html?slug=${next.slug}" class="group p-4 border border-gray-800 hover:border-cyber-blue bg-cyber-gray/30 transition-all rounded-sm text-right">
                        <div class="text-xs text-gray-500 font-mono mb-1 group-hover:text-cyber-blue">NEXT_LOG &gt;</div>
                        <div class="text-white font-bold truncate">${next.title}</div>
                    </a>`;
                }
                nav.innerHTML = html;
            } catch (e) {
                // silently ignore nav loading errors
            }
        }

        // Mode toggle (whole page light/dark)
        let isDarkMode = false;
        function toggleMode() {
            const md = document.getElementById('markdown-content');
            const btn = document.getElementById('mode-toggle');
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.body.classList.remove('page-light');
                md.classList.remove('md-light');
                md.classList.add('md-dark');
                btn.innerHTML = '<i data-lucide="moon" class="w-3.5 h-3.5 inline-block align-middle"></i> Dark';
            } else {
                document.body.classList.add('page-light');
                md.classList.remove('md-dark');
                md.classList.add('md-light');
                btn.innerHTML = '<i data-lucide="sun" class="w-3.5 h-3.5 inline-block align-middle"></i> Light';
            }
            lucide.createIcons();
        }

        // Generate TOC from markdown headings
        function generateTOC() {
            const content = document.getElementById('markdown-content');
            const tocLinks = document.getElementById('toc-links');
            const headings = content.querySelectorAll('h1, h2, h3');
            if (headings.length === 0) return;

            let html = '';
            let counters = [0, 0, 0]; // h1, h2, h3
            headings.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                const level = h.tagName.toLowerCase();
                let prefix = '';
                if (level === 'h1') {
                    counters[0]++;
                    counters[1] = 0;
                    counters[2] = 0;
                    prefix = counters[0] + '. ';
                } else if (level === 'h2') {
                    counters[1]++;
                    counters[2] = 0;
                    prefix = counters[0] + '.' + counters[1] + ' ';
                } else {
                    counters[2]++;
                    prefix = counters[0] + '.' + counters[1] + '.' + counters[2] + ' ';
                }
                const cls = level === 'h3' ? 'toc-h3' : '';
                html += `<a href="#${id}" class="${cls}" data-target="${id}">${prefix}${h.textContent}</a>`;
            });
            tocLinks.innerHTML = html;

            // Scroll spy: highlight active TOC link
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.querySelectorAll('a').forEach(a => a.classList.remove('active'));
                        const link = tocLinks.querySelector(`a[data-target="${entry.target.id}"]`);
                        if (link) link.classList.add('active');
                    }
                });
            }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });

            headings.forEach(h => observer.observe(h));
        }

        // Initialize
        loadPost();
        BlogAPI.loadFooterSocials();

        // Matrix Background Effect
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width/fontSize;

        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Green text
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);

                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Scroll Progress Bar
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };
    </script>
</body>
