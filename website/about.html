<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Rui的Playground</title>
    
    <!-- Design Specification Comments -->
    <!--
    Design Style: Cyberpunk/Hacker Aesthetic (Dark Mode)
    Primary Colors: 
      - Background: #0a0a0a (Deep Dark)
      - Accents: #00ff41 (Neon Green), #00f3ff (Cyber Blue), #bc13fe (Neon Purple)
      - Text: #e0e0e0 (Light Gray), #ffffff (White)
    Typography: 
      - Headers/Code: 'JetBrains Mono', monospace
      - Body: 'Inter', sans-serif
    Visual Elements:
      - Glitch effects
      - Terminal-like command prompts
      - Glowing borders
      - Matrix-style backgrounds
    -->

    <!-- Fonts -->
    <link rel="stylesheet" href="assets/css/fonts.css">

    <!-- Icons -->
    <script src="assets/js/lucide.min.js"></script>

    <!-- Markdown -->
    <script src="assets/js/marked.min.js"></script>

    <!-- API Client -->
    <script src="assets/js/api.js"></script>

    <!-- Tailwind CSS -->
    <script src="assets/css/tailwind.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            black: '#0a0a0a',
                            dark: '#111111',
                            gray: '#1a1a1a',
                            light: '#e0e0e0',
                            green: '#00ff41',
                            blue: '#00f3ff',
                            purple: '#bc13fe',
                            red: '#ff003c'
                        }
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    animation: {
                        'glitch': 'glitch 1s linear infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'cursor': 'cursor .75s step-end infinite',
                    },
                    keyframes: {
                        glitch: {
                            '2%, 64%': { transform: 'translate(2px,0) skew(0deg)' },
                            '4%, 60%': { transform: 'translate(-2px,0) skew(0deg)' },
                            '62%': { transform: 'translate(0,0) skew(5deg)' },
                        },
                        cursor: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        :root {
            --sb-track-color: #0a0a0a;
            --sb-thumb-color: #00ff41;
            --sb-size: 5px;
        }

        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: var(--sb-size);
        }
        ::-webkit-scrollbar-track {
            background: var(--sb-track-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--sb-thumb-color);
            border-radius: 2px;
            box-shadow: 0 0 10px #00ff41;
        }

        /* Glitch Effect Classes */
        .glitch-text {
            position: relative;
        }
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -1px 0 #ff003c;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px;
            text-shadow: -1px 0 #00f3ff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(30px, 9999px, 10px, 0); }
            5% { clip: rect(80px, 9999px, 90px, 0); }
            10% { clip: rect(10px, 9999px, 40px, 0); }
            15% { clip: rect(50px, 9999px, 20px, 0); }
            20% { clip: rect(60px, 9999px, 70px, 0); }
            100% { clip: rect(20px, 9999px, 50px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 80px, 0); }
            5% { clip: rect(40px, 9999px, 10px, 0); }
            10% { clip: rect(90px, 9999px, 30px, 0); }
            15% { clip: rect(20px, 9999px, 60px, 0); }
            20% { clip: rect(70px, 9999px, 50px, 0); }
            100% { clip: rect(50px, 9999px, 20px, 0); }
        }

        /* Matrix Background */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            pointer-events: none;
        }

        /* Scanline Effect */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 9999;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0, 255, 65, 0.04) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: fixed;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }

        /* Skill Bar Animation */
        @keyframes fillBar {
            from { width: 0; }
            to { width: var(--width); }
        }
        .skill-bar-fill {
            animation: fillBar 1.5s ease-out forwards;
        }

        /* About Bio Markdown */
        .about-bio-content p { margin-bottom: 1em; }
        .about-bio-content a { color: #00f3ff; text-decoration: underline; }
        .about-bio-content strong { color: #fff; }
        .about-bio-content ul { list-style: disc; padding-left: 1.5em; margin: 1em 0; }
        .about-bio-content li { margin: 0.3em 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <!-- Matrix Background Canvas -->
    <canvas id="matrix-bg"></canvas>
    
    <!-- Scanline Overlay -->
    <div class="scanline"></div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-cyber-black/90 backdrop-blur-md border-b border-cyber-green/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center gap-2 group">
                        <div class="w-8 h-8 bg-cyber-green/10 border border-cyber-green flex items-center justify-center rounded-sm group-hover:bg-cyber-green/20 transition-all">
                            <i data-lucide="terminal" class="w-5 h-5 text-cyber-green"></i>
                        </div>
                        <span class="font-mono font-bold text-xl text-white tracking-tighter group-hover:text-cyber-green transition-colors">Rui's<span class="text-cyber-green">Playground</span></span>
                    </a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="index.html" class="font-mono text-gray-300 hover:text-cyber-green hover:border-b-2 hover:border-cyber-green px-3 py-2 rounded-md text-sm font-medium transition-all">~/home</a>
                        <a href="blog.html" class="font-mono text-gray-300 hover:text-cyber-blue hover:border-b-2 hover:border-cyber-blue px-3 py-2 rounded-md text-sm font-medium transition-all">~/blog</a>
                        <a href="tags.html" class="font-mono text-gray-300 hover:text-cyber-purple hover:border-b-2 hover:border-cyber-purple px-3 py-2 rounded-md text-sm font-medium transition-all">~/tags</a>
                        <a href="about.html" class="font-mono text-cyber-red px-3 py-2 rounded-md text-sm font-medium border-b-2 border-cyber-red">~/about</a>
                    </div>
                </div>
                <div class="md:hidden">
                    <button type="button" class="text-gray-300 hover:text-white p-2">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow pt-24 pb-16">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Profile Header -->
            <div class="flex flex-col md:flex-row items-center md:items-start gap-8 mb-16">
                <div class="relative group">
                    <div class="w-40 h-40 rounded-full overflow-hidden border-2 border-cyber-green p-1 relative z-10 bg-cyber-black">
                        <img id="about-avatar" src="assets/images/avatar.png" alt="Profile Avatar" class="w-full h-full rounded-full object-cover">
                    </div>
                    <div class="absolute inset-0 rounded-full bg-cyber-green/20 blur-xl group-hover:bg-cyber-green/40 transition-all duration-500"></div>
                    <div class="absolute -bottom-2 -right-2 bg-cyber-black border border-cyber-green text-cyber-green text-xs font-mono px-2 py-1 rounded z-20">
                        LVL.99
                    </div>
                </div>

                <div class="text-center md:text-left flex-1">
                    <h1 id="about-name" class="text-4xl font-bold text-white font-mono mb-2 glitch-text" data-text="Loading...">Loading...</h1>
                    <p id="about-title" class="text-cyber-blue font-mono text-lg mb-4"></p>
                    <div id="about-bio" class="text-gray-400 leading-relaxed mb-6 max-w-2xl about-bio-content">
                    </div>

                    <div id="about-social" class="flex flex-wrap justify-center md:justify-start gap-4">
                        <a href="#" id="social-github" class="hidden items-center gap-2 px-4 py-2 bg-cyber-gray border border-gray-700 text-gray-300 hover:border-cyber-green hover:text-cyber-green transition-all rounded-sm group">
                            <i data-lucide="github" class="w-4 h-4"></i>
                            <span class="font-mono text-sm">GITHUB</span>
                        </a>
                        <a href="#" id="social-twitter" class="hidden items-center gap-2 px-4 py-2 bg-cyber-gray border border-gray-700 text-gray-300 hover:border-cyber-blue hover:text-cyber-blue transition-all rounded-sm group">
                            <i data-lucide="twitter" class="w-4 h-4"></i>
                            <span class="font-mono text-sm">TWITTER</span>
                        </a>
                        <a href="#" id="social-email" class="hidden items-center gap-2 px-4 py-2 bg-cyber-gray border border-gray-700 text-gray-300 hover:border-cyber-purple hover:text-cyber-purple transition-all rounded-sm group">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                            <span class="font-mono text-sm">EMAIL</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Skills Tags -->
            <div id="skills-section" class="mb-16 hidden">
                <h2 class="text-2xl font-bold text-white font-mono mb-8 flex items-center gap-2">
                    <i data-lucide="cpu" class="text-cyber-green"></i>
                    SKILL_MODULES
                </h2>

                <div id="skills-container" class="flex flex-wrap gap-3">
                    <!-- Skills will be loaded dynamically -->
                </div>
            </div>

            <!-- Work Experience -->
            <div id="experience-section" class="mb-16 hidden">
                <h2 class="text-2xl font-bold text-white font-mono mb-8 flex items-center gap-2">
                    <i data-lucide="briefcase" class="text-cyber-blue"></i>
                    WORK_EXPERIENCE
                </h2>

                <div id="experience-container" class="relative border-l border-gray-800 ml-3 space-y-12">
                    <!-- Experience items will be loaded dynamically -->
                </div>
            </div>

            <!-- Education -->
            <div id="education-section" class="mb-16 hidden">
                <h2 class="text-2xl font-bold text-white font-mono mb-8 flex items-center gap-2">
                    <i data-lucide="graduation-cap" class="text-cyber-purple"></i>
                    EDUCATION_LOGS
                </h2>

                <div id="education-container" class="relative border-l border-gray-800 ml-3 space-y-12">
                    <!-- Education items will be loaded dynamically -->
                </div>
            </div>

            <!-- Contact Terminal -->
            <div>
                <h2 class="text-2xl font-bold text-white font-mono mb-6 flex items-center gap-2">
                    <i data-lucide="send" class="text-cyber-red"></i>
                    INITIATE_CONTACT
                </h2>
                
                <div class="bg-black border border-gray-800 rounded-md overflow-hidden shadow-2xl">
                    <div class="bg-gray-900 px-4 py-2 flex items-center gap-2 border-b border-gray-800">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        <span class="ml-2 text-xs text-gray-500 font-mono">contact.sh — 80x24</span>
                    </div>
                    <div class="p-6 font-mono text-sm">
                        <form class="space-y-4">
                            <div>
                                <label class="block text-cyber-green mb-1">> Enter your name:</label>
                                <input type="text" class="w-full bg-gray-900/50 border border-gray-700 text-white px-3 py-2 focus:border-cyber-green focus:outline-none focus:ring-1 focus:ring-cyber-green transition-all" placeholder="_">
                            </div>
                            <div>
                                <label class="block text-cyber-blue mb-1">> Enter your email:</label>
                                <input type="email" class="w-full bg-gray-900/50 border border-gray-700 text-white px-3 py-2 focus:border-cyber-blue focus:outline-none focus:ring-1 focus:ring-cyber-blue transition-all" placeholder="_">
                            </div>
                            <div>
                                <label class="block text-cyber-purple mb-1">> Enter message payload:</label>
                                <textarea rows="4" class="w-full bg-gray-900/50 border border-gray-700 text-white px-3 py-2 focus:border-cyber-purple focus:outline-none focus:ring-1 focus:ring-cyber-purple transition-all" placeholder="_"></textarea>
                            </div>
                            <button type="button" onclick="alert('Coming Soon — 联系功能开发中')" class="px-6 py-2 bg-cyber-green/10 border border-cyber-green text-cyber-green hover:bg-cyber-green hover:text-black transition-all font-bold mt-2">
                                SEND_TRANSMISSION
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-cyber-dark border-t border-gray-800 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="mb-6 md:mb-0">
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="terminal" class="w-5 h-5 text-cyber-green"></i>
                        <span class="font-mono font-bold text-lg text-white">Rui's<span class="text-cyber-green">Playground</span></span>
                    </div>
                    <p class="text-gray-500 text-sm font-mono">© 2026 Autonomous Systems. All rights reserved.</p>
                </div>
                <div class="flex space-x-6">
                    <a id="footer-github" href="#" class="text-gray-500 hover:text-cyber-green transition-colors">
                        <i data-lucide="github" class="w-5 h-5"></i>
                    </a>
                    <a id="footer-twitter" href="#" class="text-gray-500 hover:text-cyber-blue transition-colors">
                        <i data-lucide="twitter" class="w-5 h-5"></i>
                    </a>
                    <a id="footer-email" href="#" class="text-gray-500 hover:text-cyber-purple transition-colors">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Matrix Background Effect
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;

        const fontSize = 16;
        const columns = canvas.width/fontSize;

        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Green text
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);

                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load about content from API
        async function loadAbout() {
            try {
                const res = await fetch('/api/v1/settings/about');
                if (!res.ok) return;

                const data = await res.json();

                // Update name
                if (data.name) {
                    const nameEl = document.getElementById('about-name');
                    nameEl.textContent = data.name;
                    nameEl.setAttribute('data-text', data.name);
                }

                // Update title
                if (data.title) {
                    document.getElementById('about-title').textContent = data.title;
                }

                // Update bio (supports Markdown)
                if (data.bio) {
                    document.getElementById('about-bio').innerHTML = marked.parse(data.bio);
                }

                // Update avatar
                if (data.avatar) {
                    document.getElementById('about-avatar').src = data.avatar;
                }

                // Update social links
                if (data.social_github) {
                    const el = document.getElementById('social-github');
                    el.href = data.social_github;
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                }
                if (data.social_twitter) {
                    const el = document.getElementById('social-twitter');
                    el.href = data.social_twitter;
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                }
                if (data.social_email) {
                    const el = document.getElementById('social-email');
                    el.href = 'mailto:' + data.social_email;
                    el.classList.remove('hidden');
                    el.classList.add('flex');
                }

                // Update skills
                if (data.skills && data.skills.length > 0) {
                    const colors = ['green', 'blue', 'purple', 'red'];
                    const container = document.getElementById('skills-container');
                    container.innerHTML = data.skills.map((skill, i) => {
                        const color = colors[i % colors.length];
                        return `<span class="px-4 py-2 bg-cyber-gray border border-cyber-${color}/50 text-cyber-${color} font-mono text-sm hover:bg-cyber-${color}/20 transition-all">${skill}</span>`;
                    }).join('');
                    document.getElementById('skills-section').classList.remove('hidden');
                }

                // Update work experience
                if (data.experience && data.experience.length > 0) {
                    const expColors = ['green', 'blue', 'purple', 'red'];
                    const expColorHex = { green: '#00ff41', blue: '#00f3ff', purple: '#bc13fe', red: '#ff003c' };
                    const container = document.getElementById('experience-container');
                    container.innerHTML = data.experience.map((item, i) => {
                        const color = expColors[i % expColors.length];
                        return `
                            <div class="relative pl-8">
                                <div class="absolute -left-[5px] top-2 w-2.5 h-2.5 rounded-full bg-cyber-${color}" style="box-shadow: 0 0 10px ${expColorHex[color]}"></div>
                                <div class="mb-1 text-sm font-mono text-cyber-${color}">${escapeHtml(item.period)}</div>
                                <h3 class="text-xl font-bold text-white mb-2">${escapeHtml(item.title)}${item.org ? ' @ ' + escapeHtml(item.org) : ''}</h3>
                                ${item.desc ? `<p class="text-gray-400 text-sm">${escapeHtml(item.desc)}</p>` : ''}
                            </div>
                        `;
                    }).join('');
                    document.getElementById('experience-section').classList.remove('hidden');
                }

                // Update education
                if (data.education && data.education.length > 0) {
                    const eduColors = ['purple', 'blue', 'green', 'red'];
                    const eduColorHex = { green: '#00ff41', blue: '#00f3ff', purple: '#bc13fe', red: '#ff003c' };
                    const container = document.getElementById('education-container');
                    container.innerHTML = data.education.map((item, i) => {
                        const color = eduColors[i % eduColors.length];
                        return `
                            <div class="relative pl-8">
                                <div class="absolute -left-[5px] top-2 w-2.5 h-2.5 rounded-full bg-cyber-${color}" style="box-shadow: 0 0 10px ${eduColorHex[color]}"></div>
                                <div class="mb-1 text-sm font-mono text-cyber-${color}">${escapeHtml(item.period)}</div>
                                <h3 class="text-xl font-bold text-white mb-2">${escapeHtml(item.title)}${item.org ? ' @ ' + escapeHtml(item.org) : ''}</h3>
                                ${item.desc ? `<p class="text-gray-400 text-sm">${escapeHtml(item.desc)}</p>` : ''}
                            </div>
                        `;
                    }).join('');
                    document.getElementById('education-section').classList.remove('hidden');
                }

                lucide.createIcons();
            } catch (error) {
                console.error('Failed to load about:', error);
            }
        }

        // Initialize
        loadAbout();
        BlogAPI.loadFooterSocials();
    </script>
</body>
</html>
